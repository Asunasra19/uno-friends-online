<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: #333; color: white; display: flex; gap: 20px; padding: 50px; font-family: sans-serif; }
    .card { width: 120px; height: 168px; background: #D32F2F; border-radius: 12px; border: 5px solid white; position: relative; overflow: hidden; }
    .inner { width: calc(100% - 16px); height: calc(100% - 16px); margin: 8px; border-radius: 9px; border: 2px solid rgba(0,0,0,0.5); }
    .center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .oval { width: 72px; height: 100px; background: #111; border-radius: 50%; transform: rotate(-25deg); position: absolute; top: 50%; left: 50%; margin-top: -50px; margin-left: -36px;}
  </style>
</head>
<body>
  <div>
    <h3>Reverse</h3>
    <div class="card">
      <div class="inner"></div>
      <div class="oval"></div>
      <svg class="center" width="70" height="70" viewBox="-35 -35 70 70">
        <!-- size = 70. r = 70 * 0.34 = 23.8. sw = 70 * 0.09 = 6.3. aw = 70 * 0.12 = 8.4 -->
        <g stroke-linecap="round">
          <path d="M -14.28 -20.23 A 23.8 23.8 0 0 1 23.8 0" fill="none" stroke="#fff" stroke-width="6.3" />
          <polygon points="-14.28,-20.23 -22.68,-8.47 -5.88,-8.47" fill="#fff" />
          <path d="M 14.28 20.23 A 23.8 23.8 0 0 1 -23.8 0" fill="none" stroke="#fff" stroke-width="6.3" />
          <polygon points="14.28,20.23 5.88,8.47 22.68,8.47" fill="#fff" />
        </g>
      </svg>
    </div>
  </div>

  <div>
    <h3>+2</h3>
    <div class="card">
      <div class="inner"></div>
      <div class="oval"></div>
      <svg class="center" width="70" height="70" viewBox="-35 -35 70 70">
        <!-- size=70. cw=19.6, ch=26.6, rad=4.2 -->
        <g>
          <rect x="-5.88" y="-18.62" width="19.6" height="26.6" rx="4.2" ry="4.2" fill="#fff" opacity="0.5" />
          <rect x="-13.72" y="-7.98" width="19.6" height="26.6" rx="4.2" ry="4.2" fill="none" stroke="#fff" stroke-width="4.9" />
          <text x="-3.92" y="9.31" text-anchor="middle" dominant-baseline="middle" font-size="19.6" font-weight="900" font-family="Arial Black" fill="#fff">+2</text>
        </g>
      </svg>
    </div>
  </div>
</body>
</html>
